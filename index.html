 <!DOCTYPE html>
 <html lang="zh-CN">
 <head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
 <title>酷酷的库</title>
 <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
 <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
 <style>
 :root{
     --primary:#6C5CE7;
     --primary-light:#A29BFE;
     --primary-dark:#5A4BD1;
     --success:#00B894;
     --error:#FF7675;
     --bg:#0F0F23;
     --card:#1A1A3E;
     --card-hover:#252550;
     --text:#EAEAFF;
     --text-secondary:#8888AA;
     --border:#2D2D5E;
     --radius:12px;
     --radius-sm:8px;
     --shadow:0 4px 20px rgba(0,0,0,0.3);
 }
 *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
 html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);}
 #app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow:hidden;}
 .app-header{
     background:linear-gradient(135deg,var(--primary),#8B5CF6);
     padding:16px 20px 14px;
     flex-shrink:0;
     display:flex;
     align-items:center;
     justify-content:space-between;
     position:relative;
     z-index:10;
 }
 .app-header h1{
     font-size:20px;font-weight:700;
     display:flex;align-items:center;gap:8px;
 }
 .app-header h1 span{font-size:22px;}
 .header-actions{display:flex;gap:8px;}
 .header-btn{
     background:rgba(255,255,255,0.2);
     border:none;color:#fff;
     width:36px;height:36px;border-radius:50%;
     display:flex;align-items:center;justify-content:center;
     font-size:18px;cursor:pointer;
     transition:background 0.2s;
 }
 .header-btn:active{background:rgba(255,255,255,0.35);}
 .page-container{flex:1;overflow:hidden;position:relative;}
 .page{display:none;height:100%;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;}
 .page.active{display:flex;}
 .bank-list{padding:16px;}
 .bank-card{
     background:var(--card);border-radius:var(--radius);
     padding:16px;margin-bottom:12px;
     border:1px solid var(--border);
     cursor:pointer;transition:all 0.2s;
     position:relative;
 }
 .bank-card:active{transform:scale(0.98);background:var(--card-hover);}
 .bank-card .bank-name{font-size:17px;font-weight:600;display:flex;align-items:center;gap:8px;}
 .bank-card .bank-name .badge{font-size:11px;background:var(--primary);color:#fff;padding:2px 8px;border-radius:10px;font-weight:500;}
 .bank-card .bank-stats{display:flex;gap:16px;margin-top:10px;font-size:13px;color:var(--text-secondary);}
 .bank-card .bank-stats span{display:flex;align-items:center;gap:4px;}
 .bank-card .bank-actions{position:absolute;top:12px;right:12px;display:flex;gap:4px;}
 .bank-card .bank-actions button{
     background:rgba(255,255,255,0.08);
     border:none;color:var(--text-secondary);
     width:28px;height:28px;border-radius:6px;
     font-size:14px;cursor:pointer;
     display:flex;align-items:center;justify-content:center;
 }
 .bank-card .bank-actions button:active{background:rgba(255,255,255,0.15);}
 .empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary);}
 .empty-state .icon{font-size:48px;margin-bottom:16px;}
 .empty-state h3{font-size:18px;color:var(--text);margin-bottom:8px;}
 .empty-state p{font-size:14px;line-height:1.6;}
 .fab{
     position:fixed;bottom:24px;right:calc(50% - 480px/2 + 24px);left:auto;
     width:56px;height:56px;border-radius:50%;
     background:linear-gradient(135deg,var(--primary),#8B5CF6);
     border:none;color:#fff;font-size:28px;
     box-shadow:0 4px 16px rgba(108,92,231,0.5);
     cursor:pointer;display:flex;align-items:center;justify-content:center;
     transition:transform 0.2s;
     z-index:20;
 }
 @media(max-width:480px){.fab{right:24px;}}
 .fab:active{transform:scale(0.9);}
 .practice-header{
     background:var(--card);padding:12px 16px;
     border-bottom:1px solid var(--border);
     flex-shrink:0;
 }
 .practice-header .top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;}
 .practice-header .top-row .back-btn{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px;}
 .mode-tabs{display:flex;gap:4px;background:rgba(255,255,255,0.06);border-radius:8px;padding:3px;}
 .mode-tab{
     flex:1;text-align:center;padding:6px 4px;
     font-size:11px;border-radius:6px;
     background:transparent;border:none;
     color:var(--text-secondary);cursor:pointer;
     transition:all 0.2s;white-space:nowrap;
 }
 .mode-tab.active{background:var(--primary);color:#fff;font-weight:600;}
 .progress-bar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px;}
 .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--success),var(--primary-light));border-radius:2px;transition:width 0.3s ease;}
 .stats-row{display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--text-secondary);}
 .question-area{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
 .question-number{font-size:13px;color:var(--primary-light);margin-bottom:8px;font-weight:600;}
 .question-type{display:inline-block;font-size:11px;background:rgba(108,92,231,0.2);color:var(--primary-light);padding:2px 10px;border-radius:10px;margin-bottom:10px;}
 .question-text{font-size:18px;line-height:1.6;margin-bottom:20px;font-weight:500;}
 .options{display:flex;flex-direction:column;gap:10px;}
 .option-btn{
     display:flex;align-items:center;gap:12px;
     padding:14px 16px;
     background:var(--card);border:2px solid var(--border);
     border-radius:var(--radius-sm);
     color:var(--text);font-size:15px;line-height:1.4;
     cursor:pointer;transition:all 0.2s;
     text-align:left;width:100%;
 }
 .option-btn:active{transform:scale(0.98);}
 .option-btn .option-label{
     width:28px;height:28px;border-radius:50%;
     background:rgba(255,255,255,0.08);
     display:flex;align-items:center;justify-content:center;
     font-weight:600;font-size:13px;flex-shrink:0;
 }
 .option-btn .option-text{flex:1;}
 .option-btn.selected{border-color:var(--primary);background:rgba(108,92,231,0.15);}
 .option-btn.selected .option-label{background:var(--primary);color:#fff;}
 .option-btn.correct{border-color:var(--success);background:rgba(0,184,148,0.15);}
 .option-btn.correct .option-label{background:var(--success);color:#fff;}
 .option-btn.wrong{border-color:var(--error);background:rgba(255,118,117,0.15);}
 .option-btn.wrong .option-label{background:var(--error);color:#fff;}
 .option-btn.disabled{cursor:default;opacity:0.8;}
 .answer-feedback{padding:14px 16px;border-radius:var(--radius-sm);margin:16px 0;font-size:15px;font-weight:600;text-align:center;}
 .answer-feedback.correct{background:rgba(0,184,148,0.15);color:var(--success);}
 .answer-feedback.wrong{background:rgba(255,118,117,0.15);color:var(--error);}
 .answer-feedback .correct-answer{font-weight:400;font-size:13px;margin-top:4px;color:var(--text-secondary);}
 .confirm-btn{
     width:100%;padding:14px;
     background:linear-gradient(135deg,var(--primary),#8B5CF6);
     border:none;border-radius:var(--radius-sm);
     color:#fff;font-size:16px;font-weight:600;
     cursor:pointer;margin-top:12px;
     display:none;
 }
 .confirm-btn.show{display:block;}
 .nav-buttons{display:flex;gap:10px;margin-top:20px;padding-bottom:20px;}
 .nav-btn{
     flex:1;padding:12px;border-radius:var(--radius-sm);
     border:2px solid var(--border);background:var(--card);
     color:var(--text);font-size:13px;font-weight:600;
     cursor:pointer;text-align:center;
     transition:all 0.2s;
 }
 .nav-btn:active{transform:scale(0.97);}
 .nav-btn.primary{background:var(--primary);border-color:var(--primary);color:#fff;}
 .nav-btn:disabled{opacity:0.3;cursor:default;}
 .bookmark-btn{
     position:fixed;bottom:100px;
     right:calc(50% - 480px/2 + 24px);left:auto;
     width:44px;height:44px;border-radius:50%;
     background:var(--card);border:2px solid var(--border);
     color:var(--text-secondary);font-size:20px;
     cursor:pointer;display:flex;align-items:center;justify-content:center;
     z-index:15;transition:all 0.2s;
 }
 @media(max-width:480px){.bookmark-btn{right:24px;}}
 .bookmark-btn.active{color:#FFD700;border-color:#FFD700;background:rgba(255,215,0,0.1);}
.speak-btn{background:rgba(108,92,231,0.15);border:1px solid var(--primary);color:var(--primary-light);padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;margin:0 0 16px 0;display:inline-flex;align-items:center;gap:6px;transition:all 0.2s;border:none;}
.speak-btn:active{transform:scale(0.95);}
.speak-btn.speaking{background:rgba(0,184,148,0.2);border-color:var(--success);color:var(--success);}
 .modal-overlay{
     display:none;position:fixed;top:0;left:0;right:0;bottom:0;
     background:rgba(0,0,0,0.6);
     z-index:100;align-items:flex-end;justify-content:center;
 }
 .modal-overlay.show{display:flex;}
 .modal-sheet{
     max-width:480px;width:100%;
     max-height:70vh;
     background:var(--card);border-radius:16px 16px 0 0;
     padding:20px;overflow-y:auto;
     animation:slideUp 0.3s ease;
 }
 @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
 .modal-sheet .modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
 .modal-sheet h3{font-size:16px;margin-bottom:12px;color:var(--text);}
 .question-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:6px;}
 .q-grid-item{
     aspect-ratio:1;border-radius:8px;
     display:flex;align-items:center;justify-content:center;
     font-size:12px;font-weight:600;
     cursor:pointer;border:1px solid var(--border);
     background:var(--bg);color:var(--text-secondary);
     transition:all 0.15s;position:relative;
 }
 .q-grid-item:active{transform:scale(0.9);}
 .q-grid-item.answered-correct{background:rgba(0,184,148,0.25);border-color:var(--success);color:var(--success);}
 .q-grid-item.answered-wrong{background:rgba(255,118,117,0.25);border-color:var(--error);color:var(--error);}
 .q-grid-item.current{border-color:var(--primary);box-shadow:0 0 0 2px rgba(108,92,231,0.3);}
 .import-area{
     border:2px dashed var(--border);
     border-radius:var(--radius);
     padding:40px 20px;text-align:center;
     cursor:pointer;transition:all 0.2s;
     margin-bottom:16px;
 }
 .import-area:active{border-color:var(--primary);background:rgba(108,92,231,0.05);}
 .import-area .icon{font-size:40px;margin-bottom:12px;}
 .import-area h3{font-size:16px;margin-bottom:6px;}
 .import-area p{font-size:13px;color:var(--text-secondary);}
 .import-hidden{display:none;}
 .preview-table{width:100%;font-size:12px;border-collapse:collapse;margin-top:12px;}
 .preview-table th,.preview-table td{border:1px solid var(--border);padding:6px 8px;text-align:left;}
 .preview-table th{background:rgba(108,92,231,0.15);color:var(--primary-light);}
 .bank-name-input{
     width:100%;padding:12px 16px;
     background:var(--bg);border:2px solid var(--border);
     border-radius:var(--radius-sm);color:var(--text);
     font-size:16px;margin-top:12px;
 }
 .bank-name-input:focus{outline:none;border-color:var(--primary);}
 .import-btn{
     width:100%;padding:14px;
     background:linear-gradient(135deg,var(--primary),#8B5CF6);
     border:none;border-radius:var(--radius-sm);
     color:#fff;font-size:16px;font-weight:600;
     cursor:pointer;margin-top:12px;
 }
 .import-btn:disabled{opacity:0.4;cursor:default;}
 .cancel-btn{
     width:100%;padding:12px;
     background:transparent;border:2px solid var(--border);
     border-radius:var(--radius-sm);
     color:var(--text-secondary);font-size:14px;
     cursor:pointer;margin-top:8px;
 }
 .bank-settings-list{margin-bottom:16px;}
 .setting-item{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);}
 .setting-item:last-child{border:none;}
 .setting-item .label{font-size:15px;}
 .setting-item .action-btn{
     padding:8px 16px;border-radius:var(--radius-sm);
     border:none;font-size:13px;font-weight:600;cursor:pointer;
 }
 .setting-item .action-btn.danger{background:rgba(255,118,117,0.2);color:var(--error);}
 .setting-item .action-btn.primary{background:rgba(108,92,231,0.2);color:var(--primary-light);}
 .danger-zone{margin-top:16px;padding:12px;background:rgba(255,118,117,0.08);border:1px solid rgba(255,118,117,0.2);border-radius:var(--radius-sm);text-align:center;}
 .danger-zone button{background:var(--error);color:#fff;border:none;padding:10px 24px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;}
 .danger-zone p{font-size:12px;color:var(--text-secondary);margin-bottom:8px;}
 .toast{
     position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
     background:var(--card);color:var(--text);
     padding:12px 24px;border-radius:var(--radius-sm);
     font-size:14px;box-shadow:var(--shadow);
     z-index:200;opacity:0;
     transition:opacity 0.3s;
     max-width:400px;text-align:center;
     border:1px solid var(--border);
 }
 .toast.show{opacity:1;}
 ::-webkit-scrollbar{width:4px;}
 ::-webkit-scrollbar-track{background:transparent;}
 ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
 @media(min-width:481px){#app{border-left:1px solid var(--border);border-right:1px solid var(--border);}}
 
/* Search */
.search-bar{display:flex;gap:8px;padding:8px 16px;background:var(--card);border-bottom:1px solid var(--border);}
.search-bar input{flex:1;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;}
.search-bar input:focus{outline:none;border-color:var(--primary);}

/* Exam mode */
.exam-setup{padding:20px;}
.exam-setup h3{margin-bottom:16px;}
.setup-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.setup-row label{font-size:15px;}
.setup-row input[type=number]{width:80px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:15px;text-align:center;}
.setup-row select{padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;}
.start-exam-btn{width:100%;padding:14px;background:linear-gradient(135deg,#E17055,#D63031);border:none;border-radius:8px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin-top:20px;}
.exam-timer{background:var(--card);padding:8px 16px;display:flex;justify-content:space-between;align-items:center;font-size:14px;border-bottom:1px solid var(--border);}
.exam-timer .time{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;}
.exam-timer .time.warning{color:var(--error);}
.exam-report{text-align:center;}
.exam-report .score-circle{width:100px;height:100px;border-radius:50%;border:4px solid var(--success);display:flex;align-items:center;justify-content:center;margin:16px auto;font-size:32px;font-weight:700;}
.exam-report .score-details{display:flex;flex-direction:column;gap:8px;margin:16px 0;text-align:left;}
.score-detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px;}

/* Goal */
.goal-section{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px;}
.goal-section .goal-header{display:flex;justify-content:space-between;margin-bottom:8px;}
.goal-section .goal-header h4{font-size:15px;margin:0;}
.goal-section .goal-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.goal-section .goal-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--success));border-radius:3px;transition:width 0.3s;}
.edit-goal-btn{background:none;border:none;color:var(--primary-light);font-size:12px;cursor:pointer;}

/* Stat cards */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;}
.stat-card .stat-value{font-size:24px;font-weight:700;color:var(--text);}
.stat-card .stat-label{font-size:12px;color:var(--text-secondary);margin-top:4px;}

/* Print */
@media print{.no-print{display:none!important;}body{background:#fff!important;color:#000!important;}.question-text{font-size:14px!important;}

</style>
 </head>
 <body>
 
 <div id="app">
     <div class="app-header">
         <h1><span>📚</span>酷酷的库</h1>
         <div class="header-actions">
             <button class="header-btn" onclick="showStats()" title="统计">📊</button><button class="header-btn" onclick="showImport()" title="导入题库">📥</button>
         </div>
     </div>
 
     <div class="page-container" id="pageContainer">
         <div class="page active" id="pageHome">
             <div class="goal-section no-print" id="goalSection"><div class="goal-header"><h4>今日目标</h4><span><span id="goalProgress">0</span>/<span id="goalTarget">0</span> 题 <button class="edit-goal-btn" onclick="editGoal()">✏️</button></span></div><div class="goal-bar"><div class="goal-fill" id="goalFill" style="width:0%"></div></div></div><div class="bank-list" id="bankList"></div>
             <button class="fab" onclick="showImport()" id="fabBtn">+</button>
         </div>
 
         <div class="page" id="pagePractice">
             <div class="practice-header">
                 <div class="top-row">
                     <button class="back-btn" onclick="goHome()">←</button>
                     <span id="practiceBankName" style="font-weight:600;font-size:15px;"></span>
                     <div class="mode-tabs" id="modeTabs">
                         <button class="mode-tab active" data-mode="sequential" onclick="switchMode('sequential')">顺序</button>
                         <button class="mode-tab" data-mode="random" onclick="switchMode('random')">随机</button>
                         <button class="mode-tab" data-mode="wrong" onclick="switchMode('wrong')">错题</button>
                         <button class="mode-tab" data-mode="bookmark" onclick="switchMode('bookmark')">收藏</button><button class="mode-tab" data-mode="exam" onclick="showExamSetup()">模拟</button>
                     </div>
                 </div>
                 <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
                 <div class="search-bar no-print"><input type="text" id="searchInput" placeholder="搜索题目关键词..." oninput="searchQuestions(this.value)"><button class="header-btn" onclick="document.getElementById('searchInput').value='';searchQuestions('')" style="background:rgba(255,255,255,0.08);border:none;border-radius:50%;color:var(--text-secondary);width:36px;height:36px;font-size:16px;cursor:pointer;">✕</button></div><div class="stats-row">
                     <span id="progressText">0/0</span>
                     <span id="accuracyText">正确率: 0%</span>
                 </div>
             </div>
             <div class="question-area" id="questionArea"></div>
             <button class="bookmark-btn" id="bookmarkBtn" onclick="toggleBookmark()">☆</button>
         </div>
     </div>
 </div>
 
 <div class="modal-overlay" id="modalStats" onclick="if(event.target===this)closeModal('modalStats')"><div class="modal-sheet"><div class="modal-handle"></div><h3>📊 学习统计</h3><div class="stat-grid" id="statsGrid"></div><button class="cancel-btn" onclick="closeModal('modalStats')">关闭</button></div></div>

<div class="modal-overlay" id="modalNavigator" onclick="if(event.target===this)closeModal('modalNavigator')">
     <div class="modal-sheet">
         <div class="modal-handle"></div>
         <h3>题目导航</h3>
         <div class="question-grid" id="questionGrid"></div>
     </div>
 </div>
 
 <div class="modal-overlay" id="modalImport" onclick="if(event.target===this)closeModal('modalImport')">
     <div class="modal-sheet">
         <div class="modal-handle"></div>
         <h3 id="importTitle">导入题库</h3>
         <div class="import-area" id="importArea" onclick="document.getElementById('fileInput').click()">
             <div class="icon">📂</div>
             <h3>选择 Excel 或 JSON 文件</h3>
             <p>支持 .xlsx / .xls / .json 格式</p>
         </div>
         <input type="file" id="fileInput" accept=".xlsx,.xls,.json" class="import-hidden" onchange="handleFileSelect(event)">
         <div id="importPreview"></div>
         <input type="text" class="bank-name-input" id="bankNameInput" placeholder="题库名称">
         <button class="import-btn" id="confirmImportBtn" disabled onclick="confirmImport()">确认导入</button>
         <button class="cancel-btn" onclick="closeModal('modalImport')">取消</button>
     </div>
 </div>

 const STORAGE_KEY = 'kukukude_state';
 
 let state = loadState();
 let questionOrder = [];
 let currentQuestionIdx = 0;
 
 function getDefaultState() {
     return { banks: {}, bankOrder: [], activeBankId: null, version: 1 };
 }
 
 function loadState() {
     try {
         const raw = localStorage.getItem(STORAGE_KEY);
         if (raw) return JSON.parse(raw);
     } catch(e) {}
     return getDefaultState();
 }
 
 function saveState() {
     try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
     catch(e) { showToast('存储空间已满'); }
 }
 
 function initDefaultBank() {
     const bankId = 'bank_default';
     if (!state.banks[bankId]) {
         state.banks[bankId] = {
             id: bankId, name: '飞行安全员题库',
             questions: DEFAULT_QUESTIONS, progress: {}
         };
         state.bankOrder.push(bankId);
     }
     if (!state.activeBankId) state.activeBankId = bankId;
     const bank = state.banks[bankId];
     bank.questions.forEach(q => {
         const key = String(q.id);
         if (!bank.progress[key])
             bank.progress[key] = { answered: false, correct: false, wrong: false, bookmarked: false };
     });
     saveState();
 }
 
 function getActiveBank() { return state.banks[state.activeBankId]; }
 
 function showPage(pageId) {
     document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
     document.getElementById(pageId).classList.add('active');
 }
 
 function goHome() { showPage('pageHome'); renderBankList(); }
 
 function goPractice() {
     showPage('pagePractice');
     const bank = getActiveBank();
     document.getElementById('practiceBankName').textContent = bank.name;
     buildQuestionOrder();
     renderCurrentQuestion();
 }
 
 function openModal(id) { document.getElementById(id).classList.add('show'); }
 function closeModal(id) { document.getElementById(id).classList.remove('show'); }
 
 let toastTimer = null;
 function showToast(msg) {
     const el = document.getElementById('toast');
     el.textContent = msg; el.classList.add('show');
     clearTimeout(toastTimer);
     toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
 }
 
 function renderBankList() {
     const container = document.getElementById('bankList');
     if (state.bankOrder.length === 0) {
         container.innerHTML = '<div class="empty-state"><div class="icon">📚</div><h3>还没有题库</h3><p>点击右下角的 + 按钮<br>导入 Excel 或 JSON 题库文件</p></div>';
         document.getElementById('fabBtn').style.display = 'flex';
         return;
     }
     let html = '';
     state.bankOrder.forEach(bankId => {
         const bank = state.banks[bankId];
         if (!bank) return;
         let total = bank.questions.length;
         let answered = 0, correct = 0;
         Object.values(bank.progress).forEach(p => { if (p.answered) answered++; if (p.correct) correct++; });
         const acc = answered > 0 ? Math.round(correct/answered*100) : 0;
         const pct = total > 0 ? Math.round(answered/total*100) : 0;
         html += '<div class="bank-card" onclick="selectBank(\''+bankId+'\')">';
         html += '<div class="bank-actions">';
         html += '<button onclick="event.stopPropagation();exportBank(\''+bankId+'\')" title="导出">📤</button>';
         html += '<button onclick="event.stopPropagation();showBankSettings(\''+bankId+'\')" title="设置">⚙</button>';
         html += '</div>';
         html += '<div class="bank-name"><span>'+bank.name+'</span>';
         if (bankId === state.activeBankId) html += '<span class="badge">当前</span>';
         html += '</div>';
         html += '<div class="bank-stats">';
         html += '<span>📝 '+total+'题</span>';
         html += '<span>✅ '+answered+'/'+total+' ('+pct+'%)</span>';
         html += '<span>🎯 '+acc+'%</span>';
         html += '</div></div>';
     });
     container.innerHTML = html;
 }
 
 
function searchQuestions(keyword){
    document.getElementById('searchInput').focus();
    if(!keyword||keyword.length<1){buildQuestionOrder();renderCurrentQuestion();return;}
    const bank=getActiveBank();if(!bank)return;
    const k=keyword.toLowerCase();
    const ids=bank.questions.filter(function(q){return q.question.toLowerCase().includes(k)||(q.answer&&q.answer.toLowerCase().includes(k));}).map(function(q){return q.id;});
    if(ids.length===0){document.getElementById('questionArea').innerHTML='<div class=\"empty-state\" style=\"padding:40px\"><div class=\"icon\">🔍</div><h3>未找到相关题目</h3></div>';return;}
    questionOrder=ids;currentQuestionIdx=0;renderCurrentQuestion();
}

function startExam(){
    closeModal('modalExamSetup');
    var count=parseInt(document.getElementById('examCount').value)||20;
    var timeLimit=parseInt(document.getElementById('examTimeLimit').value)||15;
    var examType=document.getElementById('examType').value;
    const bank=getActiveBank();if(!bank)return;
    var pool=bank.questions;
    if(examType==='judge')pool=pool.filter(function(q){return q.type.includes('判断');});
    else if(examType==='single')pool=pool.filter(function(q){return q.type.includes('单选');});
    else if(examType==='multi')pool=pool.filter(function(q){return q.type.includes('多选');});
    if(pool.length===0){showToast('没有符合条件的题目');return;}
    count=Math.min(count,pool.length);
    var shuffled=[].concat(pool).sort(function(){return 0.5-Math.random();});
    var selected=shuffled.slice(0,count);
    var ids=selected.map(function(q){return q.id;});
    // Switch to exam mode
    document.querySelectorAll('#modeTabs .mode-tab').forEach(function(t){t.classList.toggle('active',t.dataset.mode==='exam');});
    questionOrder=ids;currentQuestionIdx=0;
    examState={active:true,startTime:Date.now(),timeLimit:timeLimit*60,answers:{},timer:null};
    renderExamQuestion();
    examState.timer=setInterval(function(){
        var elapsed=Math.floor((Date.now()-examState.startTime)/1000);
        var remaining=examState.timeLimit-elapsed;
        var timerEl=document.getElementById('examTimer');
        if(timerEl){
            var min=Math.floor(remaining/60);var sec=remaining%60;
            timerEl.textContent=min.toString().padStart(2,'0')+':'+sec.toString().padStart(2,'0');
            timerEl.classList.toggle('warning',remaining<60);
        }
        if(remaining<=0){endExam();}
    },1000);
}
var examState=null;

function renderExamQuestion(){
    if(!examState||!examState.active){switchMode('sequential');return;}
    const area=document.getElementById('questionArea');
    const bank=getActiveBank();
    var answered=Object.keys(examState.answers).length;
    var total=questionOrder.length;
    var remaining=Math.floor((examState.timeLimit-Math.floor((Date.now()-examState.startTime)/1000))/60);
    var timerHtml='<div class=\"exam-timer\" id=\"examTimerWrap\"><span class=\"exam-progress\">'+answered+'/'+total+'</span><span class=\"time\" id=\"examTimer\">'+Math.floor(remaining/60).toString().padStart(2,'0')+':'+(remaining%60).toString().padStart(2,'0')+'</span></div>';
    
    if(currentQuestionIdx>=questionOrder.length){currentQuestionIdx=questionOrder.length-1;}
    if(currentQuestionIdx<0)currentQuestionIdx=0;
    if(questionOrder.length===0){area.innerHTML=timerHtml+'<div class=\"empty-state\"><div class=\"icon\">🎉</div><h3>考试结束！</h3></div>';return;}
    
    const qId=questionOrder[currentQuestionIdx];
    const q=bank.questions.find(function(x){return x.id===qId;});if(!q)return;
    var isMulti=q.type.includes('多选');
    var existingAnswer=examState.answers[String(qId)]||null;
    
    var optHtml='<div class=\"options\">';
    if(q.type.includes('判断')){
        ['对','错'].forEach(function(v){
            var sel=existingAnswer===v?'selected':'';
            optHtml+='<button class=\"option-btn '+sel+'\" onclick=\"examSelect(this,'+q.id+',\''+v+'\')\"><span class=\"option-label\">'+v+'</span><span class=\"option-text\">'+v+'</span></button>';
        });
    }else{
        Object.keys(q.options).forEach(function(k){
            var sel=existingAnswer&&existingAnswer.includes(k)?'selected':'';
            var val=q.options[k].replace(/'/g,"\\'");
            optHtml+='<button class=\"option-btn '+sel+'\" data-key=\"'+k+'\" onclick=\"examSelect(this,'+q.id+',\''+k+'\')\"><span class=\"option-label\">'+k+'</span><span class=\"option-text\">'+val+'</span></button>';
        });
    }
    optHtml+='</div>';
    var confirmHtml=isMulti?'<button class=\"confirm-btn\" onclick=\"examConfirmMulti('+q.id+')\" id=\"examConfirmBtn\">确认提交</button>':'';
    
    area.innerHTML=timerHtml+
        '<div class=\"question-number\">第 '+(currentQuestionIdx+1)+'/'+total+' 题</div>'+
        '<div class=\"question-type\">'+q.type+'</div>'+
        '<div class=\"question-text\">'+q.question+'</div>'+
        optHtml+confirmHtml+
        '<div class=\"nav-buttons no-print\">'+
        '<button class=\"nav-btn\" onclick=\"navQuestion(-1)\"'+(currentQuestionIdx<=0?' disabled':'')+'>◀ 上一题</button>'+
        '<button class=\"nav-btn\" onclick=\"navQuestion(1)\">跳过 ▶</button>'+
        '</div>'+
        '<div class=\"nav-buttons no-print\"><button class=\"nav-btn primary\" onclick=\"endExam()\" style=\"background:var(--error);border-color:var(--error);\">✋ 交卷</button></div>';
    
    document.getElementById('bookmarkBtn').style.display='none';
}

function examSelect(btn,qId,value){
    if(!examState||!examState.active)return;
    const bank=getActiveBank();
    const q=bank.questions.find(function(x){return x.id===qId;});if(!q)return;
    if(q.type.includes('多选')){
        btn.classList.toggle('selected');
        var sel=document.querySelectorAll('.option-btn.selected');
        var confirmBtn=document.getElementById('examConfirmBtn');
        if(confirmBtn)confirmBtn.classList.toggle('show',sel.length>0);
        return;
    }
    // Single selection
    document.querySelectorAll('.option-btn').forEach(function(b){b.classList.remove('selected');});
    btn.classList.add('selected');
    examState.answers[String(qId)]=value;
    // After selecting, show next button
    setTimeout(function(){if(currentQuestionIdx<questionOrder.length-1)navQuestion(1);},400);
}

function examConfirmMulti(qId){
    if(!examState||!examState.active)return;
    var sel=document.querySelectorAll('.option-btn.selected');
    var keys=[];sel.forEach(function(b){keys.push(b.dataset.key);});
    if(keys.length===0)return;
    examState.answers[String(qId)]=keys.sort().join('');
    document.getElementById('examConfirmBtn').classList.remove('show');
    setTimeout(function(){if(currentQuestionIdx<questionOrder.length-1)navQuestion(1);},400);
}

function endExam(){
    if(!examState||!examState.active)return;
    examState.active=false;
    if(examState.timer){clearInterval(examState.timer);examState.timer=null;}
    
    const bank=getActiveBank();
    var total=questionOrder.length;
    var answered=0,correct=0;
    var typeStats={};
    
    questionOrder.forEach(function(qId){
        var q=bank.questions.find(function(x){return x.id===qId;});if(!q)return;
        var ans=examState.answers[String(qId)]||'';
        if(!typeStats[q.type])typeStats[q.type]={total:0,correct:0};
        typeStats[q.type].total++;
        if(!ans)return;
        answered++;
        var isCorrect=false;
        if(q.type.includes('判断')){isCorrect=q.answer===ans;}
        else if(q.type.includes('多选')){
            var correctSorted=q.answer.split('').map(function(s){return s.trim();}).sort().join('');
            var userSorted=ans.split('').sort().join('');
            isCorrect=correctSorted===userSorted;
        }else{isCorrect=q.answer.includes(ans);}
        if(isCorrect){correct++;typeStats[q.type].correct++;}
        else{
            // Add to wrong question bank
            var key=String(qId);
            if(!bank.progress[key])bank.progress[key]={answered:false,correct:false,wrong:false,bookmarked:false};
            bank.progress[key].wrong=true;
        }
    });
    saveState();
    
    var scorePct=total>0?Math.round(correct/total*100):0;
    var elapsed=Math.floor((Date.now()-examState.startTime)/1000);
    var min=Math.floor(elapsed/60);var sec=elapsed%60;
    var timeStr=min.toString().padStart(2,'0')+':'+sec.toString().padStart(2,'0');
    
    var reportHtml='<div class=\"exam-report\"><h2>📝 考试报告</h2>'+
        '<div class=\"score-circle\" style=\"border-color:'+(scorePct>=60?'var(--success)':'var(--error)')+';color:'+(scorePct>=60?'var(--success)':'var(--error)')+';\">'+scorePct+'%</div>'+
        '<p style=\"font-size:18px;font-weight:600;\">'+correct+'/'+total+' 正确</p>'+
        '<p style=\"font-size:13px;color:var(--text-secondary);\">用时 '+timeStr+' | 已答 '+answered+'/'+total+' 题</p>'+
        '<div class=\"score-details\">';
    Object.keys(typeStats).forEach(function(t){
        var s=typeStats[t];
        var tp=s.total>0?Math.round(s.correct/s.total*100):0;
        reportHtml+='<div class=\"score-detail-row\"><span>'+t+'</span><span>'+s.correct+'/'+s.total+' ('+tp+'%)</span></div>';
    });
    reportHtml+='</div></div>';
    
    document.getElementById('questionArea').innerHTML=reportHtml+'<div class=\"nav-buttons no-print\"><button class=\"nav-btn\" onclick=\"switchMode(\'wrong\')\">❌ 查看错题</button><button class=\"nav-btn primary\" onclick=\"switchMode(\'sequential\')\">继续练习</button></div>';
    document.getElementById('bookmarkBtn').style.display='none';
    switchMode('sequential'); // Reset mode tab visually
    document.querySelectorAll('#modeTabs .mode-tab').forEach(function(t){t.classList.toggle('active',t.dataset.mode==='sequential');});
    showToast('考试完成！正确率 '+scorePct+'%');
}

function showStats(){
    const bank=getActiveBank();if(!bank)return;
    var grid=document.getElementById('statsGrid');
    var totalT=bank.questions.length;
    var totalA=0,totalC=0;
    var types={};
    bank.questions.forEach(function(q){
        if(!types[q.type])types[q.type]={total:0,answered:0,correct:0};
        types[q.type].total++;
        var p=bank.progress[String(q.id)];
        if(p&&p.answered){totalA++;types[q.type].answered++;if(p.correct){totalC++;types[q.type].correct++;}}
    });
    var allPct=totalA>0?Math.round(totalC/totalA*100):0;
    var html='<div class=\"stat-card\"><div class=\"stat-value\">'+totalC+'/'+totalA+'</div><div class=\"stat-label\">总体正确</div><div class=\"stat-sub\">正确率 '+allPct+'%</div></div>'+
        '<div class=\"stat-card\"><div class=\"stat-value\">'+totalA+'/'+totalT+'</div><div class=\"stat-label\">完成进度</div><div class=\"stat-sub\">'+Math.round(totalA/totalT*100)+'%</div></div>';
    Object.keys(types).forEach(function(t){
        var s=types[t];
        var pct=s.answered>0?Math.round(s.correct/s.answered*100):0;
        html+='<div class=\"stat-card\"><div class=\"stat-value\">'+s.correct+'/'+s.answered+'</div><div class=\"stat-label\">'+t+'</div><div class=\"stat-sub\">'+pct+'%</div></div>';
    });
    grid.innerHTML=html;
    openModal('modalStats');
}

function updateGoal(){

    var lastDate=localStorage.getItem('kuku_goal_date')||'';

function selectBank(bankId) {
     state.activeBankId = bankId; saveState(); goPractice();
 }
 
 function buildQuestionOrder() {
     const bank = getActiveBank(); if (!bank) return;
     const mode = getCurrentMode(); let ids = [];
     if (mode === 'wrong') {
         ids = Object.entries(bank.progress).filter(([k,p]) => p.wrong).map(([k]) => parseInt(k)).sort((a,b)=>a-b);
     } else if (mode === 'bookmark') {
         ids = Object.entries(bank.progress).filter(([k,p]) => p.bookmarked).map(([k]) => parseInt(k)).sort((a,b)=>a-b);
     } else if (mode === 'random') {
         ids = bank.questions.map(q => q.id);
         for (let i = ids.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [ids[i],ids[j]] = [ids[j],ids[i]]; }
     } else {
         ids = bank.questions.map(q => q.id);
     }
     questionOrder = ids; currentQuestionIdx = 0;
 }
 
 function getCurrentMode() {
     const t = document.querySelector('#modeTabs .mode-tab.active');
     return t ? t.dataset.mode : 'sequential';
 }
 
 function switchMode(mode) {
     document.querySelectorAll('#modeTabs .mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
     buildQuestionOrder();
     const names = {wrong:'错题',bookmark:'收藏',sequential:'顺序',random:'随机'};
     if (questionOrder.length === 0) {
         document.getElementById('questionArea').innerHTML = '<div class="empty-state" style="padding:40px 20px"><div class="icon">📭</div><h3>暂无'+names[mode]+'题目</h3><p>'+
             (mode==='wrong'?'做错的题会自动出现在这里':'点击题目上的 ☆ 收藏题目')+'</p></div>';
         updateProgress(); return;
     }
     currentQuestionIdx = 0; renderCurrentQuestion();
 }
 
 function renderCurrentQuestion() {
     const area = document.getElementById('questionArea');
     if (questionOrder.length === 0) {
         area.innerHTML = '<div class="empty-state" style="padding:40px 20px"><div class="icon">🎉</div><h3>没有可显示的题目</h3></div>';
         updateProgress(); return;
     }
     if (currentQuestionIdx >= questionOrder.length) currentQuestionIdx = questionOrder.length-1;
     if (currentQuestionIdx < 0) currentQuestionIdx = 0;
     const qId = questionOrder[currentQuestionIdx];
     const bank = getActiveBank();
     const question = bank.questions.find(q => q.id === qId);
     if (!question) return;
     const prog = bank.progress[String(qId)];
     const isAnswered = prog && prog.answered;
     const isBookmarked = prog && prog.bookmarked;
     const isMulti = question.type.includes('多选');
     const total = questionOrder.length;
     const modeTexts = {sequential:'顺序模式',random:'随机模式',wrong:'错题专练',bookmark:'收藏复习'};
     const modeText = modeTexts[getCurrentMode()] || '';
 
     let optHtml = '<div class="options">';
     if (question.type.includes('判断')) {
         ['对','错'].forEach(v => {
             let cls = isAnswered ? (question.answer===v?'correct disabled':'wrong disabled') : '';
             optHtml += '<button class="option-btn '+cls+'" onclick="selectOption(this,'+question.id+',\''+v+'\')"'+(isAnswered?' disabled':'')+'>';
             optHtml += '<span class="option-label">'+v+'</span><span class="option-text">'+v+'</span></button>';
         });
     } else {
         Object.keys(question.options).forEach(k => {
             let cls = '';
             if (isAnswered) {
                 if (question.answer.includes(k)) cls = 'correct disabled';
                 else if (prog && prog.selectedAnswer && prog.selectedAnswer.includes(k) && !question.answer.includes(k)) cls = 'wrong disabled';
             }
             const val = question.options[k].replace(/'/g,"\\'");
             optHtml += '<button class="option-btn '+cls+'" data-key="'+k+'" onclick="selectOption(this,'+question.id+',\''+k+'\')"'+(isAnswered?' disabled':'')+'>';
             optHtml += '<span class="option-label">'+k+'</span><span class="option-text">'+val+'</span></button>';
         });
     }
     optHtml += '</div>';
 
     let fbHtml = '';
     if (isAnswered) {
         fbHtml = '<div class="answer-feedback '+(prog.correct?'correct':'wrong')+'">'+
             (prog.correct?'✅ 回答正确！':'❌ 回答错误')+
             '<div class="correct-answer">正确答案: '+question.answer+'</div></div>';
     }
 
     const confirmHtml = isMulti ? '<button class="confirm-btn" id="confirmMultiBtn" onclick="confirmMultiSelect('+question.id+')">确认提交</button>' : '';
     document.getElementById('bookmarkBtn').textContent = isBookmarked ? '★' : '☆';
     document.getElementById('bookmarkBtn').classList.toggle('active', isBookmarked);
 
     area.innerHTML = '<div class="question-number">第 '+(currentQuestionIdx+1)+' / '+total+' 题 <span style="color:var(--text-secondary);font-weight:400;">· '+modeText+'</span></div>'+
         '<div class="question-type">'+question.type+'</div>'+
         '<div class="question-text">'+question.question+'</div>'+'<button class="speak-btn" id="speakBtn" onclick="speakQuestion()">🔊 朗读</button>'+
         optHtml+fbHtml+confirmHtml+
         '<div class="nav-buttons">'+
         '<button class="nav-btn" onclick="navQuestion(-1)"'+(currentQuestionIdx<=0?' disabled':'')+'>◀ 上一题</button>'+
         '<button class="nav-btn" onclick="openNavigator()">☰ 导航</button>'+
         '<button class="nav-btn primary" onclick="navQuestion(1)"'+(currentQuestionIdx>=questionOrder.length-1?' disabled':'')+'>下一题 ▶</button>'+
         '</div>';
     updateProgress();
 }
 
 function selectOption(btn, qId, value) {
     const bank = getActiveBank();
     const question = bank.questions.find(q => q.id === qId);
     if (!question) return;
     const prog = bank.progress[String(qId)];
     if (prog && prog.answered) return;
     const isMulti = question.type.includes('多选');
     if (isMulti) {
         btn.classList.toggle('selected');
         const sel = document.querySelectorAll('.option-btn.selected');
         document.getElementById('confirmMultiBtn').classList.toggle('show', sel.length > 0);
         return;
     }
     const correct = question.type.includes('判断') ? question.answer === value : question.answer.includes(value);
     document.querySelectorAll('.option-btn').forEach(b => { b.classList.add('disabled'); b.disabled = true; });
     if (correct) { btn.classList.add('correct'); }
     else {
         btn.classList.add('wrong');
         document.querySelectorAll('.option-btn').forEach(b => {
             const key = b.dataset.key || b.querySelector('.option-label').textContent;
             if (question.answer.includes(key)) b.classList.add('correct');
         });
     }
     bank.progress[String(qId)] = { answered: true, correct, wrong: !correct, bookmarked: !!(prog&&prog.bookmarked), selectedAnswer: value };
     saveState();
     const fb = document.createElement('div');
     fb.className = 'answer-feedback '+(correct?'correct':'wrong');
     fb.innerHTML = correct ? '✅ 回答正确！' : '❌ 回答错误';
     if (!correct) fb.innerHTML += '<div class="correct-answer">正确答案: '+question.answer+'</div>';
     document.querySelector('.options').after(fb);
     updateProgress();
     setTimeout(() => { if (currentQuestionIdx < questionOrder.length-1) navQuestion(1); }, correct ? 800 : 1500);
 }
 
 function confirmMultiSelect(qId) {
     const bank = getActiveBank(); const question = bank.questions.find(q => q.id === qId);
     const selected = document.querySelectorAll('.option-btn.selected');
     const keys = []; selected.forEach(b => keys.push(b.dataset.key));
     if (keys.length === 0) return;
     const userAns = keys.sort().join(''); const corrAns = question.answer.split('').map(s=>s.trim()).sort().join('');
     const isCorrect = userAns === corrAns;
     document.querySelectorAll('.option-btn').forEach(b => {
         b.classList.add('disabled'); b.disabled = true;
         const k = b.dataset.key;
         if (question.answer.includes(k)) b.classList.add('correct');
         else if (keys.includes(k)) b.classList.add('wrong');
     });
     document.getElementById('confirmMultiBtn').classList.remove('show');
     bank.progress[String(qId)] = { answered: true, correct: isCorrect, wrong: !isCorrect, bookmarked: !!(bank.progress[String(qId)]&&bank.progress[String(qId)].bookmarked), selectedAnswer: keys.join('') };
     saveState();
     const fb = document.createElement('div');
     fb.className = 'answer-feedback '+(isCorrect?'correct':'wrong');
     fb.innerHTML = isCorrect ? '✅ 回答正确！' : '❌ 回答错误';
     fb.innerHTML += '<div class="correct-answer">正确答案: '+question.answer.split('').join(', ')+'</div>';
     (document.getElementById('confirmMultiBtn')||document.querySelector('.options')).after(fb);
     updateProgress();
     setTimeout(() => { if (currentQuestionIdx < questionOrder.length-1) navQuestion(1); }, 1500);
 }
 
 
function navQuestion(dir){
    if(examState&&examState.active){
        var ni=currentQuestionIdx+dir;
        if(ni<0||ni>=questionOrder.length)return;
        currentQuestionIdx=ni;renderExamQuestion();
        return;
    }

    var ni=currentQuestionIdx+dir;
    if(ni<0||ni>=questionOrder.length)return;
    currentQuestionIdx=ni;renderCurrentQuestion();
}

function speakQuestion(){
    const bank=getActiveBank();if(!bank||questionOrder.length===0)return;
    const qId=questionOrder[currentQuestionIdx];
    const q=bank.questions.find(x=>x.id===qId);if(!q)return;
    const btn=document.getElementById('speakBtn');
    if(window.speechSynthesis.speaking){window.speechSynthesis.cancel();if(btn)btn.classList.remove('speaking');return;}
    const u=new SpeechSynthesisUtterance(q.question);
    u.lang='zh-CN';u.rate=0.9;
    u.onend=function(){if(btn)btn.classList.remove('speaking');};
    u.onstart=function(){if(btn)btn.classList.add('speaking');};
    window.speechSynthesis.speak(u);
}
 
 function toggleBookmark() {
     const bank = getActiveBank(); if (!bank || questionOrder.length === 0) return;
     const key = String(questionOrder[currentQuestionIdx]);
     if (!bank.progress[key]) bank.progress[key] = { answered: false, correct: false, wrong: false, bookmarked: false };
     bank.progress[key].bookmarked = !bank.progress[key].bookmarked;
     saveState();
     document.getElementById('bookmarkBtn').textContent = bank.progress[key].bookmarked ? '★' : '☆';
     document.getElementById('bookmarkBtn').classList.toggle('active', bank.progress[key].bookmarked);
     showToast(bank.progress[key].bookmarked ? '已收藏 ✨' : '取消收藏');
 }
 
 function updateProgress() {
     const bank = getActiveBank(); if (!bank) return;
     const answeredCnt = Object.values(bank.progress).filter(p => p.answered).length;
     const correctCnt = Object.values(bank.progress).filter(p => p.correct).length;
     const total = bank.questions.length;
     const pct = total > 0 ? Math.round(answeredCnt/total*100) : 0;
     const acc = answeredCnt > 0 ? Math.round(correctCnt/answeredCnt*100) : 0;
     document.getElementById('progressFill').style.width = pct+'%';
     document.getElementById('progressText').textContent = answeredCnt+'/'+total;
     document.getElementById('accuracyText').textContent = '正确率: '+acc+'%';
 }
 
 function openNavigator() {
     const bank = getActiveBank(); if (!bank) return;
     const grid = document.getElementById('questionGrid');
     let html = '';
     bank.questions.forEach(q => {
         const p = bank.progress[String(q.id)];
         let cls = p && p.answered ? (p.correct ? 'answered-correct' : 'answered-wrong') : '';
         const isCurrent = questionOrder.length > 0 && questionOrder[currentQuestionIdx] === q.id;
         html += '<div class="q-grid-item '+cls+(isCurrent?' current':'')+'" onclick="navigateToQuestion('+q.id+')">'+q.id+
             (p&&p.bookmarked?'<span style="position:absolute;top:-2px;right:2px;font-size:10px;color:#FFD700;">★</span>':'')+'</div>';
     });
     grid.innerHTML = html; openModal('modalNavigator');
 }
 
 function navigateToQuestion(qId) {
     const idx = questionOrder.indexOf(qId);
     if (idx >= 0) { currentQuestionIdx = idx; closeModal('modalNavigator'); renderCurrentQuestion(); }
 }

 function handleFileSelect(event) {
     const file = event.target.files[0]; if (!file) return;
     const reader = new FileReader();
     const name = file.name.replace(/\.[^/.]+$/, '');
     document.getElementById('bankNameInput').value = name;
     if (file.name.endsWith('.json')) {
         reader.onload = function(e) {
             try {
                 const d = JSON.parse(e.target.result);
                 processImportedData(Array.isArray(d) ? d : (d.questions || []));
             } catch(err) { showToast('JSON 解析失败'); }
         };
         reader.readAsText(file, 'utf-8');
     } else {
         reader.onload = function(e) {
             try {
                 const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
                 const s = wb.Sheets[wb.SheetNames[0]];
                 processExcelData(XLSX.utils.sheet_to_json(s, {defval:''}));
             } catch(err) { showToast('Excel 解析失败'); }
         };
         reader.readAsArrayBuffer(file);
     }
 }
 
 function processExcelData(rows) {
     if (rows.length < 2) { showToast('数据不足'); return; }
     const headers = Object.keys(rows[0]);
     let qCol = null, aCol = null, typeCol = null, optCols = {};
     const labels = ['A','B','C','D','E','F','G'];
     headers.forEach(h => {
         const hh = String(h).trim();
         if (/^题目|问题|question|题目内容|考题/i.test(hh)) qCol = h;
         else if (/^答案|answer|正确答案|正确|标准答案/i.test(hh)) aCol = h;
         else if (/^类型|type|题型|类别|种类/i.test(hh)) typeCol = h;
     });
     headers.forEach(h => {
         const hh = String(h).trim();
         if (/^选项|选[A-G]|^[A-G]$|option/i.test(hh)) {
             let l = hh.replace(/^选项|option\s*/i,'').trim();
             if (l.length===1 && l>='A' && l<='G') optCols[l] = h;
         }
     });
     if (Object.keys(optCols).length === 0) {
         headers.forEach(h => {
             if (h===qCol||h===aCol||h===typeCol) return;
             const l = labels[Object.keys(optCols).length];
             if (l) optCols[l] = h;
         });
     }
     const questions = [];
     rows.forEach((row,idx) => {
         const qText = qCol ? String(row[qCol]||'').trim() : '';
         if (!qText && idx < 5) return;
         if (!qText) return;
         const answer = aCol ? String(row[aCol]||'').trim() : '';
         const rawType = typeCol ? String(row[typeCol]||'').trim() : '';
         let detectedType = rawType;
         if (!detectedType) {
             if (answer === '对'||answer === '错'||answer === '正确'||answer === '错误') detectedType = '判断题';
             else if (answer && answer.length > 1 && /^[A-G\s]+$/.test(answer)) detectedType = '多选题';
             else if (answer && answer.length === 1 && answer >= 'A' && answer <= 'G') detectedType = '单选题';
             else detectedType = '判断题';
         }
         const options = {};
         Object.keys(optCols).forEach(label => {
             const val = String(row[optCols[label]]||'').trim();
             if (val) options[label] = val;
         });
         if (detectedType.includes('判断') && Object.keys(options).length === 0) { options['对']='对'; options['错']='错'; }
         questions.push({ id: idx+1, question: qText, type: detectedType, answer, options });
     });
     if (questions.length === 0) { showToast('未能识别出题目'); return; }
     processImportedData(questions);
 }
 
 function processImportedData(questions) {
     const preview = document.getElementById('importPreview');
     const types = {}; questions.forEach(q => { types[q.type] = (types[q.type]||0)+1; });
     const typeStr = Object.entries(types).map(([k,v]) => k+' '+v+'题').join('、');
     let html = '<div style="margin-top:12px;padding:12px;background:rgba(108,92,231,0.1);border-radius:8px;">';
     html += '<strong>识别结果：'+questions.length+'道题</strong><br>';
     html += '<span style="font-size:13px;color:var(--text-secondary);">'+typeStr+'</span></div>';
     if (questions.length > 0) {
         html += '<table class="preview-table"><thead><tr><th>#</th><th>题目</th><th>类型</th><th>答案</th></tr></thead><tbody>';
         questions.slice(0,5).forEach(q => {
             html += '<tr><td>'+q.id+'</td><td>'+(q.question.length>30?q.question.substring(0,30)+'...':q.question)+'</td><td>'+q.type+'</td><td>'+q.answer+'</td></tr>';
         });
         if (questions.length > 5) html += '<tr><td colspan="4" style="text-align:center;color:var(--text-secondary);">... 还有 '+(questions.length-5)+' 道题</td></tr>';
         html += '</tbody></table>';
     }
     preview.innerHTML = html;
     document.getElementById('confirmImportBtn').disabled = false;
     pendingImportData = questions;
 }
 
 function confirmImport() {
     if (!pendingImportData) return;
     const name = document.getElementById('bankNameInput').value.trim();
     if (!name) { showToast('请输入题库名称'); return; }
     const bankId = 'bank_'+Date.now();
     const progress = {};
     pendingImportData.forEach(q => { progress[String(q.id)] = { answered: false, correct: false, wrong: false, bookmarked: false }; });
     state.banks[bankId] = { id: bankId, name, questions: pendingImportData, progress };
     state.bankOrder.push(bankId);
     state.activeBankId = bankId;
     saveState();
     closeModal('modalImport');
     showToast('导入成功！共 '+pendingImportData.length+' 题 ✅');
     renderBankList();
     pendingImportData = null;
     setTimeout(() => goPractice(), 500);
 }
 
 function showBankSettings(bankId) {
     const bank = state.banks[bankId]; if (!bank) return;
     document.getElementById('settingsTitle').textContent = bank.name+' - 设置';
     document.getElementById('settingsList').innerHTML =
         '<div class="setting-item"><span class="label">重命名</span><input type="text" id="renameInput" value="'+bank.name.replace(/'/g,"\\'")+'" style="padding:6px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;width:150px;"></div>'+
         '<div class="setting-item"><span class="label">导出错题</span><button class="action-btn primary" onclick="exportWrongAnswers(''+bankId+')">导出</button></div>
        <div class="setting-item"><span class="label">导出题库</span><button class="action-btn primary" onclick="exportBank(\''+bankId+'\')">导出 JSON</button></div>'+
         '<div class="setting-item"><span class="label">重置进度</span><button class="action-btn primary" onclick="resetProgress(\''+bankId+'\')">重置</button></div>'+
         '<div class="danger-zone"><p>删除后将无法恢复</p><button onclick="deleteBank(\''+bankId+'\')">🗑 删除此题库</button></div>';
     openModal('modalBankSettings');
     setTimeout(() => {
         const inp = document.getElementById('renameInput');
         if (inp) inp.addEventListener('change', function(){
             const n = this.value.trim();
             if (n) { state.banks[bankId].name = n; saveState(); renderBankList(); document.getElementById('settingsTitle').textContent = n+' - 设置'; }
         });
     }, 100);
 }
 
 
function exportWrongAnswers(bankId){
    const bank=state.banks[bankId];if(!bank)return;
    var wrongIds=Object.entries(bank.progress).filter(function(e){return e[1].wrong;}).map(function(e){return parseInt(e[0]);}).sort(function(a,b){return a-b;});
    if(wrongIds.length===0){showToast('没有错题可以导出');return;}
    var text='=== '+bank.name+' - 错题集 ===\n导出日期: '+(new Date().toISOString().split('T')[0])+'\n共 '+wrongIds.length+' 题\n\n'+'='.repeat(40)+'\n\n';
    wrongIds.forEach(function(id){
        var q=bank.questions.find(function(x){return x.id===id;});if(!q)return;
        var p=bank.progress[String(id)];
        text+='第'+id+'题 ['+q.type+']\n题目：'+q.question+'\n';
        if(p&&p.selectedAnswer)text+='你的答案：'+p.selectedAnswer+'\n';
        text+='正确答案：'+q.answer+'\n\n---\n\n';
    });
    var blob=new Blob([text],{type:'text/plain;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download=bank.name+'_错题.txt';
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    showToast('已导出 '+wrongIds.length+' 道错题 📄');
}

function exportBank(bankId) {
     const bank = state.banks[bankId]; if (!bank) return;
     const data = { name: bank.name, exportDate: new Date().toISOString().split('T')[0], totalQuestions: bank.questions.length, questions: bank.questions };
     const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
     const url = URL.createObjectURL(blob);
     const a = document.createElement('a'); a.href = url; a.download = bank.name+'_题库.json';
     document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
     showToast('导出成功 📤');
 }
 
 function resetProgress(bankId) {
     if (!confirm('确定要重置所有进度吗？')) return;
     Object.keys(state.banks[bankId].progress).forEach(k => { state.banks[bankId].progress[k] = { answered:false, correct:false, wrong:false, bookmarked:false }; });
     saveState(); showToast('已重置 🔄'); renderBankList();
 }
 
 function deleteBank(bankId) {
     if (!confirm('确定要删除这个题库吗？不可恢复！')) return;
     delete state.banks[bankId];
     state.bankOrder = state.bankOrder.filter(id => id !== bankId);
     if (state.activeBankId === bankId) state.activeBankId = state.bankOrder.length > 0 ? state.bankOrder[0] : null;
     saveState(); closeModal('modalBankSettings'); renderBankList(); showToast('已删除');
 }
 
 initDefaultBank();
 renderBankList();
 
 let touchStartX = 0;
 document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
 document.addEventListener('touchend', e => {
     const page = document.querySelector('.page.active');
     if (page && page.id === 'pagePractice' && e.changedTouches[0].clientX - touchStartX > 80) goHome();
 });
 
 console.log('📚 酷酷的库 v1.0 loaded!');
 </script>
